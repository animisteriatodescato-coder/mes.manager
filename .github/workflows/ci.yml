name: CI - Build & E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MESManager/MESManager.sln

      - name: Build solution
        run: dotnet build MESManager/MESManager.sln --no-restore --configuration Release

      - name: Run unit tests (if present)
        run: dotnet test MESManager/MESManager.sln --no-build --configuration Release --filter "Category!=E2E" --logger "trx;LogFileName=test-results.trx" /p:CollectCoverage=true /p:CoverletOutputFormat=opencover
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "Your_password123"
        ports:
          - "1433:1433"
        options: >-
          --health-cmd " /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -Q 'SELECT 1' -C "
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MESManager/MESManager.sln

      - name: Build solution
        run: dotnet build MESManager/MESManager.sln --no-restore --configuration Debug

      - name: Install Playwright browsers
        run: |
          cd MESManager/tests/MESManager.E2E
          pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd MESManager/tests/MESManager.E2E
          dotnet test --no-build --configuration Debug --logger "trx;LogFileName=e2e-results.trx" --logger "console;verbosity=detailed"
        env:
          PLAYWRIGHT_HEADED: '0'
          CI: 'true'
          E2E_SEED: '1'
          E2E_BASE_URL: 'http://localhost:5156'
          ConnectionStrings__MESManagerDb: 'Server=localhost,1433;Database=MESManager_E2E;User Id=sa;Password=Your_password123;TrustServerCertificate=True;'
          ConnectionStrings__MagoDb: 'Server=localhost,1433;Database=MESManager_MagoDummy;User Id=sa;Password=Your_password123;TrustServerCertificate=True;'

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: '**/TestResults/*.trx'

      - name: Upload Playwright screenshots (failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: MESManager/tests/MESManager.E2E/playwright-results/**/*
          retention-days: 7

      - name: Upload Playwright traces (failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: MESManager/tests/MESManager.E2E/bin/Debug/net8.0/playwright-traces/**/*
          retention-days: 7

  programma-irene-tests:
    name: Programma Irene - Button Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "Your_password123"
        ports:
          - "1433:1433"
        options: >-
          --health-cmd " /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -Q 'SELECT 1' -C "
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MESManager/MESManager.sln

      - name: Build solution
        run: dotnet build MESManager/MESManager.sln --no-restore --configuration Debug

      - name: Install Playwright browsers
        run: |
          cd MESManager/tests/MESManager.E2E
          pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run Programma Irene tests
        run: |
          cd MESManager/tests/MESManager.E2E
          dotnet test --no-build --configuration Debug --filter "Feature=ProgrammaMacchine|Feature=CommesseAperte" --logger "trx;LogFileName=programma-irene-results.trx" --logger "console;verbosity=detailed"
        env:
          PLAYWRIGHT_HEADED: '0'
          CI: 'true'
          E2E_SEED: '1'
          E2E_BASE_URL: 'http://localhost:5156'
          ConnectionStrings__MESManagerDb: 'Server=localhost,1433;Database=MESManager_E2E;User Id=sa;Password=Your_password123;TrustServerCertificate=True;'
          ConnectionStrings__MagoDb: 'Server=localhost,1433;Database=MESManager_MagoDummy;User Id=sa;Password=Your_password123;TrustServerCertificate=True;'

      - name: Upload Programma Irene test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: programma-irene-test-results
          path: '**/TestResults/*.trx'

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "Your_password123"
        ports:
          - "1433:1433"
        options: >-
          --health-cmd " /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -Q 'SELECT 1' -C "
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MESManager/MESManager.sln

      - name: Build solution
        run: dotnet build MESManager/MESManager.sln --no-restore --configuration Debug

      - name: Install Playwright browsers
        run: |
          cd MESManager/tests/MESManager.E2E
          pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps chromium

      - name: Restore visual baselines from cache
        uses: actions/cache@v4
        id: baselines-cache
        with:
          path: MESManager/tests/MESManager.E2E/VisualBaselines
          key: visual-baselines-${{ github.sha }}
          restore-keys: |
            visual-baselines-

      - name: Run visual regression tests
        run: |
          cd MESManager/tests/MESManager.E2E
          dotnet test --no-build --configuration Debug --filter "Category=Visual" --logger "trx;LogFileName=visual-results.trx"
        env:
          PLAYWRIGHT_HEADED: '0'
          CI: 'true'
          E2E_SEED: '1'
          E2E_BASE_URL: 'http://localhost:5156'
          ConnectionStrings__MESManagerDb: 'Server=localhost,1433;Database=MESManager_E2E;User Id=sa;Password=Your_password123;TrustServerCertificate=True;'
          ConnectionStrings__MagoDb: 'Server=localhost,1433;Database=MESManager_MagoDummy;User Id=sa;Password=Your_password123;TrustServerCertificate=True;'
          # UPDATE_BASELINES: 'true'  # Uncommenta per aggiornare baseline

      - name: Upload visual diffs (if failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: MESManager/tests/MESManager.E2E/playwright-results/visual-diffs/**/*
          retention-days: 14

      - name: Save updated baselines
        if: success()
        uses: actions/cache/save@v4
        with:
          path: MESManager/tests/MESManager.E2E/VisualBaselines
          key: visual-baselines-${{ github.sha }}

  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [e2e-tests, visual-regression]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display test summary
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "e2e-test-results" ]; then
            echo "### E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "✅ E2E tests completed (vedi artifacts per dettagli)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "❌ E2E tests failed or skipped" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "playwright-screenshots" ]; then
            echo "### ⚠️ Visual Regression Failures" >> $GITHUB_STEP_SUMMARY
            echo "Screenshot diffs disponibili negli artifacts" >> $GITHUB_STEP_SUMMARY
          fi
